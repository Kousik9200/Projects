title: Suspicious PowerShell Encoded Command Execution
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: stable
description: Detects PowerShell execution with encoded commands, commonly used in obfuscation
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: Kousik Gunasekaran
date: 2024/01/01
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-EncodedCommand'
      - '-enc '
      - '-ec '
  selection_bypass:
    CommandLine|contains:
      - '-ExecutionPolicy Bypass'
      - '-ep bypass'
      - '-nop'
      - '-NonInteractive'
  condition: selection or selection_bypass
falsepositives:
  - Legitimate administrative scripts using encoded commands
  - Some software installers
level: medium
