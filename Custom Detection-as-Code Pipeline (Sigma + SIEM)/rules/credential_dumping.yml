title: LSASS Memory Dump via ProcDump
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: stable
description: Detects credential dumping from LSASS using ProcDump or similar tools
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: Kousik Gunasekaran
date: 2024/01/01
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_procdump:
    CommandLine|contains:
      - 'procdump'
      - 'procdump64'
    CommandLine|contains:
      - 'lsass'
  selection_rundll32:
    CommandLine|contains|all:
      - 'rundll32'
      - 'comsvcs.dll'
      - 'MiniDump'
  condition: selection_procdump or selection_rundll32
falsepositives:
  - Legitimate debugging by IT administrators
level: high
