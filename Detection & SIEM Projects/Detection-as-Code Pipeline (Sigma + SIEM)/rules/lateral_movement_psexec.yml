title: Lateral Movement via PsExec
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: stable
description: Detects lateral movement using PsExec or PsExec-like tools
references:
  - https://attack.mitre.org/techniques/T1021/002/
author: Kousik Gunasekaran
date: 2024/01/01
tags:
  - attack.lateral_movement
  - attack.t1021.002
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\psexec.exe'
      - '\psexec64.exe'
      - '\PsExec.exe'
  selection_network:
    CommandLine|contains:
      - ' \\\\' 
      - ' -s '
      - ' /s '
  condition: selection or selection_network
falsepositives:
  - Legitimate remote administration by IT teams
  - Software deployment tools
level: high
